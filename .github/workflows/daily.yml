name: Daily Bhavcopy Ingest

on:
  schedule:
    - cron: "45 14 * * 1-5"   # 14:45 UTC = 20:15 IST, Mon-Fri
  workflow_dispatch:
    inputs:
      date:
        description: "Trade date YYYY-MM-DD (optional, default: today IST)"
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      BHAVCOPY_DATA_DIR: /tmp/bhavcopy
      INPUT_DATE: ${{ github.event.inputs.date }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run daily pipeline
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python run_daily.py --date "$INPUT_DATE"
          else
            python run_daily.py
          fi
